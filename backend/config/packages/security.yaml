# config/packages/security.yaml
security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    providers:
        users_in_memory: { memory: null }
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        contact_form:
            pattern: ^/api/send-form
            methods: [POST, OPTIONS] # <--- Add OPTIONS here
            security: false # This completely disables security for this route
            stateless: true

        login:
            provider: app_user_provider
            pattern: ^/api/login-auth
            stateless: true
            user_checker: App\Security\UserChecker
            json_login:
                check_path: /api/login-auth
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~
            logout:
                path: /api/logout

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\GoogleAuthenticator

    access_control:
        - { path: ^/api/login-auth, roles: PUBLIC_ACCESS }
        - { path: ^/api/send-form, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: /verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/google/mobile, roles: PUBLIC_ACCESS}
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/doc, roles: PUBLIC_ACCESS }
          

        - { path: ^/api/auth/me, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth-user-info, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/get-login-user, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/estrellanes, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

        - { path: ^/api/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
